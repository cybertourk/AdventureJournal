<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Master's Log</title>
    
    <!-- Fonts: Merriweather for Serif/Headings, Inter for Sans/UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN for static GitHub Pages) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- FontAwesome for standard icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-stone-950 text-stone-900 font-sans bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-stone-800 to-stone-950 selection:bg-red-900 selection:text-amber-50">
    
    <!-- Global Notifications Container -->
    <div id="notification-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <!-- AUTHENTICATION SCREEN -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-[#f4ebd8] p-8 rounded-sm border-2 border-stone-700 shadow-[0_15px_40px_rgba(0,0,0,0.7)] max-w-md w-full relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-red-900"></div>
            
            <div class="text-center mb-8 mt-2">
                <i class="fa-solid fa-scroll text-4xl text-red-900 mb-3 drop-shadow-md transform -rotate-3"></i>
                <h1 class="text-3xl font-serif font-black text-stone-900 tracking-tight">Campaign Master's Log</h1>
                <p class="text-stone-500 text-xs font-bold uppercase tracking-widest mt-2">Identify Yourself</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-stone-600 uppercase tracking-widest mb-1">Email</label>
                    <input type="email" id="login-email" required class="w-full p-3 bg-[#fdfbf7] border border-[#d4c5a9] rounded-sm focus:ring-2 focus:ring-red-900 focus:outline-none font-sans shadow-inner">
                </div>
                <div>
                    <label class="block text-xs font-bold text-stone-600 uppercase tracking-widest mb-1">Password</label>
                    <input type="password" id="login-password" required class="w-full p-3 bg-[#fdfbf7] border border-[#d4c5a9] rounded-sm focus:ring-2 focus:ring-red-900 focus:outline-none font-sans shadow-inner">
                </div>
                <button type="submit" class="w-full py-3 mt-4 bg-stone-900 text-amber-50 rounded-sm hover:bg-stone-800 transition font-bold uppercase tracking-wider text-sm shadow-md">
                    Access Archives
                </button>
                <div class="text-center mt-4">
                    <button type="button" id="show-register-btn" class="text-red-900 hover:text-red-700 text-sm font-bold uppercase tracking-wider transition">Register as a New DM</button>
                </div>
            </form>

            <!-- Register Form (Hidden by Default) -->
            <form id="register-form" class="space-y-4 hidden">
                <div>
                    <label class="block text-xs font-bold text-stone-600 uppercase tracking-widest mb-1">Email</label>
                    <input type="email" id="register-email" required class="w-full p-3 bg-[#fdfbf7] border border-[#d4c5a9] rounded-sm focus:ring-2 focus:ring-red-900 focus:outline-none font-sans shadow-inner">
                </div>
                <div>
                    <label class="block text-xs font-bold text-stone-600 uppercase tracking-widest mb-1">Password (Min 6 Chars)</label>
                    <input type="password" id="register-password" required class="w-full p-3 bg-[#fdfbf7] border border-[#d4c5a9] rounded-sm focus:ring-2 focus:ring-red-900 focus:outline-none font-sans shadow-inner">
                </div>
                <!-- Note: We are defaulting to DM for now. Player toggle will be added later. -->
                <input type="hidden" id="register-role" value="dm">
                
                <button type="submit" class="w-full py-3 mt-4 bg-red-900 text-amber-50 rounded-sm hover:bg-red-800 transition font-bold uppercase tracking-wider text-sm shadow-md">
                    Forge New Account
                </button>
                <div class="text-center mt-4">
                    <button type="button" id="show-login-btn" class="text-stone-600 hover:text-stone-900 text-sm font-bold uppercase tracking-wider transition">Return to Login</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MAIN APP SCREEN (Hidden until Logged In) -->
    <div id="app-screen" class="hidden max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Top Header -->
        <header class="mb-6 pb-6 border-b border-stone-800 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-red-900 p-3 rounded-sm text-amber-50 shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-red-950 transform rotate-3">
                    <i class="fa-solid fa-scroll text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl sm:text-4xl font-serif font-black tracking-tight text-amber-500 leading-none drop-shadow-md">Campaign Master's Log</h1>
                    <p class="text-stone-400 text-sm font-bold uppercase tracking-widest mt-2" id="auth-status-text">Dungeon Master Access</p>
                </div>
            </div>
            <div>
                <button id="logout-btn" class="px-4 py-2 border border-stone-700 text-stone-400 hover:text-amber-50 hover:border-stone-500 rounded-sm transition font-bold uppercase tracking-wider text-xs flex items-center gap-2">
                    <i class="fa-solid fa-door-open"></i> Leave
                </button>
            </div>
        </header>

        <!-- Navigation Breadcrumbs -->
        <div id="breadcrumbs-container"></div>

        <!-- Dynamic View Rendering -->
        <main id="app-container" class="relative min-h-[400px]">
            <!-- Loading Spinner -->
            <div id="loading-spinner" class="absolute inset-0 flex flex-col items-center justify-center text-amber-500">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4 text-red-900"></i>
                <h2 class="text-xl font-serif font-bold tracking-widest uppercase text-amber-600">Unsealing the Vault...</h2>
            </div>
        </main>
    </div>

    <!-- Application Entry Point (ES Module) -->
    <script type="module" src="main.js"></script>
</body>
</html>
