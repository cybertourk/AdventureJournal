<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Master's Log</title>
    
    <!-- Fonts: Merriweather for Serif/Headings, Inter for Sans/UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (CDN for static GitHub Pages) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-stone-950 text-stone-900 font-sans p-4 sm:p-6 lg:p-8 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-stone-800 to-stone-950 selection:bg-red-900 selection:text-amber-50">
    <div class="max-w-6xl mx-auto">
        
        <!-- Top Header -->
        <header class="mb-6 pb-6 border-b border-stone-800 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-red-900 p-3 rounded-sm text-amber-50 shadow-[0_4px_10px_rgba(0,0,0,0.5)] border border-red-950 transform rotate-3">
                    <i data-lucide="scroll" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl sm:text-4xl font-serif font-black tracking-tight text-amber-500 leading-none drop-shadow-md">Campaign Master's Log</h1>
                    <p class="text-stone-400 text-sm font-bold uppercase tracking-widest mt-2">Standalone Tracking Environment</p>
                </div>
            </div>
        </header>

        <!-- Navigation Breadcrumbs -->
        <div id="breadcrumbs-container"></div>

        <!-- Dynamic View Rendering -->
        <main id="app-container"></main>

    </div>

    <!-- Application Modules -->
    <script src="data.js"></script>
    <script src="markdown.js"></script>
    <script src="ui-core.js"></script>
    <script src="ui-views.js"></script>
    <script src="ui-session.js"></script>
    <script src="main.js"></script>
</body>
</html>
